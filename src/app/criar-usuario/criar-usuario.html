<div class="min-h-screen bg-gradient-to-br from-black via-slate-950 to-blue-950 flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-blue-600/20 ring-1 ring-blue-500/30">
        <svg
          class="h-8 w-8 text-blue-400"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.8"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 1115 0"
          />
        </svg>
      </div>

      <h1 class="text-3xl font-bold tracking-tight text-white">
        WebUsuarios
      </h1>
      <p class="mt-2 text-sm text-slate-400">
        Crie sua conta para acessar o sistema
      </p>
    </div>

    <div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-8 shadow-2xl shadow-blue-950/40 backdrop-blur">
      
              @if(msgSucesso())
      {
        <div
          class="mb-6 rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-300"
        >
          {{ msgSucesso() }}
        </div>
      }
      @else if(msgErro())
      {
        <div
          class="mb-6 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300"
        >
          {{ msgErro() }}
        </div>
      }

      <form [formGroup]="formCadastro" (ngSubmit)="criarUsuario()" class="space-y-6">

        <div>
          <label for="nome" class="mb-2 block text-sm font-medium text-slate-200">
            Nome do usuário
          </label>
          <input
            id="nome"
            name="nome"
            type="text"
            formControlName="nome"
            placeholder="Preenche seu nome aqui"
            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white placeholder:text-slate-500 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <div>
          <label for="email" class="mb-2 block text-sm font-medium text-slate-200">
            E-mail
          </label>
          <input
            id="email"
            name="email"
            type="email"
            formControlName="email"
            placeholder="seuemail@exemplo.com"
            autocomplete="email"
            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white placeholder:text-slate-500 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <div>
          <label for="senha" class="mb-2 block text-sm font-medium text-slate-200">
            Senha
          </label>
          <input
            id="senha"
            name="senha"
            type="password"
            formControlName="senha"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white placeholder:text-slate-500 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <div>
          <label for="senhaConfirmacao" class="mb-2 block text-sm font-medium text-slate-200">
            Confirme sua senha
          </label>
          <input
            id="senhaConfirmacao"
            name="senhaConfirmacao"
            type="password"
            formControlName="senhaConfirmacao"
            placeholder="Confirme sua senha"
            autocomplete="current-password"
            class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white placeholder:text-slate-500 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <button
          type="submit"
          [disabled]="formCadastro.invalid"
          class="w-full rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-600/30 transition hover:bg-blue-500 focus:outline-none focus:ring-4 focus:ring-blue-500/30 active:scale-[0.99]"
        >
          Realizar cadastro
        </button>
      </form>

      <div class="mt-6 text-center text-sm">
        <span class="text-slate-400">Já possui uma conta?</span>
        <a
          routerLink="/pages/login"
          class="ml-1 font-medium text-blue-400 transition hover:text-blue-300 hover:underline"
        >
          Acesse aqui
        </a>
      </div>

      <p class="mt-6 text-center text-xs text-slate-500">
        Sistema de gerenciamento de usuários
      </p>
    </div>
  </div>
</div>
